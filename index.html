<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ABISAM POS - Scan Barcode/QR Only</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
    
    <style>
        body { font-family: 'Manrope', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #barcodeReader { width: 100%; border: none !important; }
        #barcodeReader video { border-radius: 20px; object-fit: cover; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

<div class="max-w-md mx-auto min-h-screen bg-white shadow-2xl flex flex-col">
    
    <main class="flex-1 p-5 overflow-y-auto">
        <section id="tab-kasir" class="tab-content active space-y-4">
            <h1 class="text-xl font-black">KASIR POS</h1>
            
            <div class="p-6 bg-slate-900 rounded-3xl text-white text-center">
                <p class="text-xs uppercase font-bold opacity-60 mb-4">Pindai Produk</p>
                <button onclick="openBarcodeScanner('kasir')" class="w-full py-4 bg-primary text-black font-black rounded-xl uppercase flex items-center justify-center gap-2">
                    <span class="material-icons-round">qr_code_scanner</span> Buka Scanner
                </button>
            </div>
            
            <div id="gridProduk" class="space-y-3"></div>
        </section>
    </main>
</div>

<div id="modalScanner" class="fixed inset-0 bg-black z-50 hidden flex flex-col">
    <div class="p-4 flex justify-between items-center text-white">
        <span class="font-black">SCAN BARCODE / QR</span>
        <button onclick="closeScanner()" class="p-2 bg-white/10 rounded-full"><span class="material-icons-round">close</span></button>
    </div>
    
    <div class="flex-1 flex items-center justify-center p-4">
        <div id="barcodeReader" class="w-full max-w-[350px] aspect-square overflow-hidden rounded-3xl border-4 border-green-500"></div>
    </div>
    
    <div class="p-6 text-white/50 text-center text-xs font-bold">
        Arahkan kamera ke Barcode atau QR Code
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('pos_p')) || [];
    let html5QrcodeScanner = null;

    function openBarcodeScanner(target) {
        document.getElementById('modalScanner').classList.remove('hidden');
        
        // Konfigurasi QR Box agar tetap bujur sangkar (square)
        const config = { 
            fps: 10, 
            qrbox: { width: 250, height: 250 }, 
            aspectRatio: 1.0 
        };

        html5QrcodeScanner = new Html5Qrcode("barcodeReader");
        html5QrcodeScanner.start(
            { facingMode: "environment" },
            config,
            (decodedText) => {
                handleScannedCode(decodedText);
            },
            (errorMessage) => { /* Ignore errors */ }
        ).catch(err => {
            alert("Kamera tidak dapat diakses.");
            closeScanner();
        });
    }

    function closeScanner() {
        if(html5QrcodeScanner) {
            html5QrcodeScanner.stop().then(() => {
                document.getElementById('modalScanner').classList.add('hidden');
            });
        }
    }

    function handleScannedCode(code) {
        closeScanner();
        // Logika pencarian produk berdasarkan barcode
        const hit = products.find(p => p.barcode === code);
        if(hit) {
            alert("Barang ditemukan: " + hit.name);
            // Tambahkan logika tambah ke keranjang di sini
        } else {
            alert("Barang dengan kode " + code + " tidak ditemukan.");
        }
    }
</script>
</body>
</html>
